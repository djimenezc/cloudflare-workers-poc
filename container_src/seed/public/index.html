<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Hello from your workspace</title>
  <style>
    body { font-family: ui-sans-serif, system-ui, sans-serif; background: #0b0f17; color: #e6edf3; display: grid; place-items: center; height: 100vh; margin: 0; }
    .card { padding: 2rem 2.5rem; background: #111827; border: 1px solid #1f2937; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,.4); text-align: center; }
    h1 { margin: 0 0 .5rem; font-size: 2rem; }
    p { margin: 0; opacity: .75; }
    code { background: #1f2937; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello from your workspace</h1>
    <p>Edit <code>public/index.html</code> in the editor and watch this update.</p>
  </div>
</body>
</html>
